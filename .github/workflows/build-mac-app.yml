name: Build macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency
        run: |
          PYPROJECT_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Inject build info
        run: uv run python scripts/inject_build_info.py

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_FILE="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_FILE="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="build-keychain-pwd"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"

          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"

          security list-keychains -d user -s "$KEYCHAIN_FILE" login.keychain-db

          IDENTITY=$(security find-identity -p codesigning "$KEYCHAIN_FILE" \
            | grep -m1 ')' | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No codesigning identity found in imported certificate"
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $IDENTITY"

          rm -f "$CERT_FILE"

      - name: Build app with PyInstaller
        run: |
          uv run pyinstaller WenZi.spec --clean --noconfirm

      - name: Re-sign app bundle
        run: |
          APP_PATH="dist/WenZi.app"
          echo "==> Re-signing app bundle..."
          codesign --force --deep --sign "$CODESIGN_IDENTITY" "$APP_PATH"
          echo "==> Verifying signature..."
          codesign --verify --verbose "$APP_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          DMG_PATH="dist/WenZi-${{ steps.version.outputs.VERSION }}-arm64.dmg"
          create-dmg \
            --volname "WenZi" \
            --volicon "resources/dmg-volume.icns" \
            --background "resources/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "WenZi.app" 175 190 \
            --app-drop-link 425 190 \
            --hide-extension "WenZi.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "dist/WenZi.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WenZi ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/WenZi-${{ steps.version.outputs.VERSION }}-arm64.dmg
